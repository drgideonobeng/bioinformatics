name: gatk_practice
channels:
  - conda-forge
  - bioconda
dependencies:
  # Core language/runtime
  - python=3.11
  - openjdk=17

  # Variant calling & genomics tools
  - gatk4=4.5.*
  - bwa=0.7.*
  - samtools=1.20
  - bcftools=1.20

  # Compression & indexing helpers
  - htslib=1.20
  - pigz
  - tabix

  # General utilities
  - coreutils
  - curl
  - wget

  # Optional but useful
  - jq

